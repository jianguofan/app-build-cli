version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: app-build-nginx
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-build-network

  # 前端服务
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: app-build-frontend
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_WS_URL=ws://localhost/ws
    restart: unless-stopped
    networks:
      - app-build-network

  # 后端服务
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: app-build-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SSH_USER=${SSH_USER}
      - SSH_KEY_PATH=/root/.ssh/id_rsa
      - GIT_REPO_URL=${GIT_REPO_URL}
      - WORKSPACE_DIR=/workspace
    volumes:
      - ~/.ssh:/root/.ssh:ro
      - ~/app-build-workspace:/workspace
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-build-network

  # Redis (任务队列)
  redis:
    image: redis:7-alpine
    container_name: app-build-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app-build-network

volumes:
  redis-data:
    driver: local

networks:
  app-build-network:
    driver: bridge
